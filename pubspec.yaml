name: speakup_connect
description: "SpeakUp Connect — Multi-tenant community reporting and communication platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # --- Navigation ---
  go_router: ^14.6.2

  # --- Firebase ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # --- Data & Serialization ---
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # --- Image Handling ---
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # --- Local Storage ---
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # --- UI ---
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.3
  flutter_markdown: ^0.7.7+1

  # --- Utilities ---
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.0

  # --- Notifications ---
  flutter_local_notifications: ^17.2.3

  # --- Icons ---
  cupertino_icons: ^1.0.8
  cloud_functions: ^5.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Code Generation ---
  build_runner: ^2.15.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.0

  # --- Linting ---
  flutter_lints: ^4.0.0

  # --- App Icon ---
  flutter_launcher_icons: ^0.14.3

  # --- Testing ---
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/help/member_guide.md
    - assets/help/admin_guide.md
    - assets/help/_default/
    - assets/help/orgs/monhs-ph-001/

  # Uncomment to add custom fonts:
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
